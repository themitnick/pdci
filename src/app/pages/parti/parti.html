<!-- Hero Banner -->
<section class="bg-gradient-to-br from-primary to-primary-dark py-16 md:py-24">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 text-center text-white">
    <h1 class="text-4xl md:text-5xl font-extrabold mb-4">Le Parti</h1>
    <p class="text-lg text-white/80 max-w-2xl mx-auto">Découvrez l'histoire, la vision et l'organisation du PDCI-RDA, premier parti politique de Côte d'Ivoire.</p>
  </div>
</section>

<!-- Sub-navigation + Content -->
<section class="py-12 md:py-16">
  <div class="max-w-7xl mx-auto px-4 sm:px-6">
    <!-- Sub-navigation cards -->
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4 mb-12">
      @for (page of subPages; track page.path) {
        <a [routerLink]="page.path"
          routerLinkActive="!border-primary !bg-primary-light !text-primary"
          class="flex flex-col items-center gap-2 p-4 rounded-xl border-2 border-gray-200 bg-white text-gray-600 hover:border-primary hover:bg-primary-light hover:text-primary transition-all duration-200 no-underline text-center group">
          <span class="text-2xl">{{ page.icon }}</span>
          <span class="text-sm font-semibold">{{ page.label }}</span>
        </a>
      }
    </div>

    <!-- Router Outlet for sub-pages -->
    <router-outlet />
  </div>
</section>
