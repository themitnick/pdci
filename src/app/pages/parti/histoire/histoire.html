<div>
  <!-- Section header -->
  <div class="mb-10">
    <div class="h-1 w-12 bg-primary mb-4"></div>
    <h2 class="text-lg font-black uppercase tracking-wider text-gray-900 mb-2">Histoire du PDCI-RDA</h2>
    <p class="text-sm text-gray-500">Les grandes dates qui ont forgé le premier parti politique de Côte d'Ivoire.</p>
  </div>

  <!-- Timeline -->
  <div class="relative max-w-3xl">
    <!-- Vertical line -->
    <div class="absolute left-5 top-0 bottom-0 w-px bg-gray-200"></div>

    <div class="space-y-6">
      @for (item of timeline; track item.year) {
        <div class="relative flex gap-5">
          <!-- Year badge -->
          <div class="relative z-10 flex items-center justify-center w-10 h-10 rounded-md bg-gray-900 text-white font-bold text-xs shrink-0">
            {{ item.year }}
          </div>
          <!-- Content -->
          <div class="flex-1 bg-white rounded-lg border border-gray-200 p-5 hover:border-primary/30 transition-colors">
            <h3 class="text-base font-bold text-gray-900 mb-1">{{ item.title }}</h3>
            <p class="text-sm text-gray-600 leading-relaxed">{{ item.description }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</div>
