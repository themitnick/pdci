<div class="max-w-3xl mx-auto">
  <h2 class="text-2xl md:text-3xl font-bold text-gray-900 mb-8">Histoire du PDCI-RDA</h2>

  <!-- Timeline -->
  <div class="relative">
    <!-- Vertical line -->
    <div class="absolute left-6 top-0 bottom-0 w-0.5 bg-primary/20"></div>

    <div class="space-y-8">
      @for (item of timeline; track item.year) {
        <div class="relative flex gap-6">
          <!-- Year badge -->
          <div class="relative z-10 flex items-center justify-center w-12 h-12 rounded-full bg-primary text-white font-bold text-xs shrink-0 shadow-lg shadow-primary/25">
            {{ item.year }}
          </div>
          <!-- Content -->
          <div class="flex-1 bg-white rounded-xl border border-gray-200 p-6 hover:shadow-md transition-shadow">
            <h3 class="text-lg font-semibold text-gray-900 mb-2">{{ item.title }}</h3>
            <p class="text-sm text-gray-600 leading-relaxed">{{ item.description }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</div>
