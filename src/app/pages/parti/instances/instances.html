<div>
  <h2 class="text-2xl md:text-3xl font-bold text-gray-900 mb-8">Instances dirigeantes</h2>

  <div class="space-y-6">
    @for (instance of instances; track instance.name) {
      <div class="bg-white rounded-xl border border-gray-200 p-6 md:p-8 hover:shadow-lg hover:border-primary/30 transition-all duration-300">
        <div class="flex flex-col md:flex-row md:items-start gap-4">
          <div class="flex-1">
            <h3 class="text-xl font-bold text-gray-900 mb-1">{{ instance.name }}</h3>
            <p class="text-sm font-medium text-primary mb-3">{{ instance.role }}</p>
            <p class="text-sm text-gray-600 leading-relaxed">{{ instance.missions }}</p>
          </div>
          <div class="shrink-0">
            <span class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-full bg-primary-light text-primary">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              {{ instance.frequency }}
            </span>
          </div>
        </div>
      </div>
    }
  </div>
</div>
