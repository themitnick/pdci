<div>
  <!-- Section header -->
  <div class="mb-10">
    <div class="h-1 w-12 bg-primary mb-4"></div>
    <h2 class="text-lg font-black uppercase tracking-wider text-gray-900 mb-2">Instances dirigeantes</h2>
    <p class="text-sm text-gray-500">Les organes décisionnels et consultatifs du parti.</p>
  </div>

  <div class="space-y-4">
    @for (instance of instances; track instance.name) {
      <div class="bg-white rounded-lg border border-gray-200 overflow-hidden hover:border-primary/30 transition-colors">
        <div class="flex flex-col md:flex-row md:items-start">
          <!-- Green side stripe -->
          <div class="hidden md:block w-1 self-stretch bg-primary shrink-0"></div>
          <div class="flex-1 p-5 md:p-6">
            <div class="flex flex-col md:flex-row md:items-start gap-4">
              <div class="flex-1">
                <h3 class="text-base font-bold text-gray-900 mb-1">{{ instance.name }}</h3>
                <p class="text-xs font-bold uppercase tracking-wider text-primary mb-3">{{ instance.role }}</p>
                <p class="text-sm text-gray-600 leading-relaxed">{{ instance.missions }}</p>
              </div>
              <div class="shrink-0">
                <span class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold rounded-md bg-gray-100 text-gray-700">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                  {{ instance.frequency }}
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>
    }
  </div>
</div>
