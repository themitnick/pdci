<div>
  <h2 class="text-2xl md:text-3xl font-bold text-gray-900 mb-8">Organigramme national</h2>

  <div class="space-y-12">
    @for (level of orgChart; track level.level) {
      <div>
        <h3 class="text-lg font-semibold text-primary mb-6 flex items-center gap-2">
          <span class="w-8 h-0.5 bg-primary rounded"></span>
          {{ level.level }}
        </h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" [class.lg:grid-cols-1]="level.members.length === 1" [class.max-w-xs]="level.members.length === 1" [class.mx-auto]="level.members.length === 1">
          @for (member of level.members; track member.name) {
            <div class="bg-white rounded-xl border border-gray-200 p-5 text-center hover:shadow-lg hover:border-primary/30 transition-all duration-300">
              <img [src]="member.image" [alt]="member.name" class="w-20 h-20 rounded-full mx-auto mb-4 object-cover bg-gray-100" loading="lazy">
              <h4 class="text-base font-semibold text-gray-900">{{ member.name }}</h4>
              <p class="text-sm text-gray-500 mt-1">{{ member.role }}</p>
            </div>
          }
        </div>
      </div>
    }
  </div>
</div>
