<div>
  <!-- Section header -->
  <div class="mb-10">
    <div class="h-1 w-12 bg-primary mb-4"></div>
    <h2 class="text-lg font-black uppercase tracking-wider text-gray-900 mb-2">Organigramme national</h2>
    <p class="text-sm text-gray-500">La structure dirigeante du PDCI-RDA à l'échelle nationale.</p>
  </div>

  <div class="space-y-12">
    @for (level of orgChart; track level.level) {
      <div>
        <h3 class="text-sm font-bold uppercase tracking-wider text-primary mb-5 flex items-center gap-3">
          <span class="w-8 h-px bg-primary"></span>
          {{ level.level }}
        </h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" [class.lg:grid-cols-1]="level.members.length === 1" [class.max-w-xs]="level.members.length === 1" [class.mx-auto]="level.members.length === 1">
          @for (member of level.members; track member.name) {
            <div class="bg-white rounded-lg border border-gray-200 p-5 text-center hover:border-primary/30 transition-colors">
              <img [src]="member.image" [alt]="member.name" class="w-20 h-20 rounded-lg mx-auto mb-4 object-cover bg-gray-100" loading="lazy">
              <h4 class="text-sm font-bold text-gray-900">{{ member.name }}</h4>
              <p class="text-xs text-gray-500 mt-1">{{ member.role }}</p>
            </div>
          }
        </div>
      </div>
    }
  </div>
</div>
