<!-- Background pattern -->
<div class="absolute inset-0 opacity-5">
  <div class="absolute inset-0" style="background-image: url('data:image/svg+xml,%3Csvg width=&quot;60&quot; height=&quot;60&quot; viewBox=&quot;0 0 60 60&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;%3E%3Cg fill=&quot;none&quot; fill-rule=&quot;evenodd&quot;%3E%3Cg fill=&quot;%23009A44&quot; fill-opacity=&quot;0.4&quot;%3E%3Ccircle cx=&quot;30&quot; cy=&quot;30&quot; r=&quot;2&quot;/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');"></div>
</div>

<div class="relative w-full max-w-md mx-4">
  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-2xl p-8 sm:p-10">
    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <img src="PDCI_logo.png" alt="PDCI-RDA" class="w-16 h-16 rounded-xl mb-4 shadow-lg shadow-primary/20 object-contain">
      <h1 class="text-2xl font-bold text-gray-900">Espace Administration</h1>
      <p class="text-sm text-gray-500 mt-1">Connectez-vous pour accéder au CRM</p>
    </div>

    <!-- Error -->
    @if (error()) {
      <div class="mb-6 p-3 rounded-lg bg-red-50 border border-red-200 flex items-center gap-2">
        <svg class="w-4 h-4 text-red-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span class="text-sm text-red-700">{{ error() }}</span>
      </div>
    }

    <!-- Form -->
    <form (submit)="onSubmit($event)" class="space-y-5">
      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Adresse email</label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/></svg>
          <input
            id="email"
            type="email"
            required
            autocomplete="email"
            placeholder="nom@pdci.ci"
            [value]="email()"
            (input)="updateEmail($event)"
            class="w-full pl-11 pr-4 py-3 text-sm border border-gray-300 rounded-lg outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder-gray-400"
          >
        </div>
      </div>

      <!-- Password -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Mot de passe</label>
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            required
            autocomplete="current-password"
            placeholder="••••••••"
            [value]="password()"
            (input)="updatePassword($event)"
            class="w-full pl-11 pr-11 py-3 text-sm border border-gray-300 rounded-lg outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder-gray-400"
          >
          <button type="button" (click)="showPassword.set(!showPassword())" class="absolute right-3 top-1/2 -translate-y-1/2 p-0.5 text-gray-400 hover:text-gray-600 transition-colors">
            @if (showPassword()) {
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
            } @else {
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            }
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="loading()"
        class="w-full py-3 text-sm font-semibold rounded-lg bg-primary text-white hover:bg-primary-dark transition-all disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2"
      >
        @if (loading()) {
          <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/></svg>
          Connexion en cours...
        } @else {
          Se connecter
        }
      </button>
    </form>

    <!-- Demo credentials — click to auto-login -->
    <div class="mt-8 pt-6 border-t border-gray-100">
      <p class="text-xs text-gray-400 text-center mb-3">Connexion rapide — cliquez sur un profil</p>
      <div class="space-y-2">
        <button (click)="loginAs('admin@pdci.ci', 'Admin@2026')" [disabled]="loading()" class="w-full flex items-center gap-3 bg-gray-50 hover:bg-primary/5 hover:border-primary/30 border border-transparent rounded-lg px-3 py-2.5 transition-all text-left cursor-pointer disabled:opacity-50">
          <div class="w-8 h-8 rounded-full bg-red-100 text-red-700 flex items-center justify-center text-xs font-bold shrink-0">AP</div>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-medium text-gray-700">Super Admin</div>
            <div class="text-[11px] text-gray-400 truncate">admin&#64;pdci.ci</div>
          </div>
          <svg class="w-4 h-4 text-gray-300 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>
        <button (click)="loginAs('regional@pdci.ci', 'Region@2026')" [disabled]="loading()" class="w-full flex items-center gap-3 bg-gray-50 hover:bg-primary/5 hover:border-primary/30 border border-transparent rounded-lg px-3 py-2.5 transition-all text-left cursor-pointer disabled:opacity-50">
          <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center text-xs font-bold shrink-0">KA</div>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-medium text-gray-700">Admin Régional</div>
            <div class="text-[11px] text-gray-400 truncate">regional&#64;pdci.ci</div>
          </div>
          <svg class="w-4 h-4 text-gray-300 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>
        <button (click)="loginAs('agent@pdci.ci', 'Agent@2026')" [disabled]="loading()" class="w-full flex items-center gap-3 bg-gray-50 hover:bg-primary/5 hover:border-primary/30 border border-transparent rounded-lg px-3 py-2.5 transition-all text-left cursor-pointer disabled:opacity-50">
          <div class="w-8 h-8 rounded-full bg-green-100 text-green-700 flex items-center justify-center text-xs font-bold shrink-0">TI</div>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-medium text-gray-700">Agent Terrain</div>
            <div class="text-[11px] text-gray-400 truncate">agent&#64;pdci.ci</div>
          </div>
          <svg class="w-4 h-4 text-gray-300 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Back to site -->
  <div class="text-center mt-6">
    <a href="/" class="text-sm text-gray-400 hover:text-white transition-colors no-underline inline-flex items-center gap-1.5">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
      Retour au site public
    </a>
  </div>
</div>
